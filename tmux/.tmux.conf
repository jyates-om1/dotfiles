# ~/.tmux.conf — sensible defaults for long-lived devenv sessions over SSM/SSH.

# 256-color inside tmux, truecolor passthrough for the outer xterm.
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Generous scrollback + mouse (scroll, select panes, resize).
set-option -g history-limit 50000
set-option -g mouse on

# Number windows/panes from 1 (0 is an awkward reach).
set -g base-index 1
setw -g pane-base-index 1

# Intuitive splits that keep the current directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config without restarting tmux.
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# Keep window titles you set; don't let programs rename them.
set-option -g allow-rename off

# Don't broadcast keystrokes to every pane unless explicitly toggled.
set-window-option -g synchronize-panes off

# --- Status bar: Catppuccin (Mocha) -----------------------------------------
# Installed directly (no plugin manager) under ~/.tmux/plugins:
#   catppuccin/tmux         — the Mocha (dark) status-bar theme
#   tmux-plugins/tmux-cpu   — feeds catppuccin's cpu/ram modules (#{cpu_percentage} etc.)
# First launch on any machine auto-clones both.
run-shell -b 'D="$HOME/.tmux/plugins/catppuccin"; [ -e "$D/catppuccin.tmux" ] || git clone --depth 1 https://github.com/catppuccin/tmux "$D" >/dev/null 2>&1'
run-shell -b 'D="$HOME/.tmux/plugins/tmux-cpu"; [ -e "$D/cpu.tmux" ] || git clone --depth 1 https://github.com/tmux-plugins/tmux-cpu "$D" >/dev/null 2>&1'

set -g status on
set -g status-interval 2
set -g status-justify left

set -g @catppuccin_flavor 'mocha'

# Flat segments — no Powerline separators. This font lacks the rounded
# half-circle glyphs (U+E0B4/E0B6) that catppuccin's default 'rounded' style
# and default status separator use, so they showed as ? boxes. 'basic' window
# style + empty status separators give clean flat blocks that need no glyphs.
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator " "
# Force the current-window separators flat too. Catppuccin sets these only if
# unset, so without this an in-place reload keeps the stale rounded glyphs.
set -g @catppuccin_window_current_left_separator " "
set -g @catppuccin_window_current_right_separator " "

# Segment icons, overridden for two reasons:
#  - catppuccin's defaults for session (Devicons) and cpu/ram (Font Awesome)
#    are glyphs this font lacks (showed as ?); these are Material Design
#    replacements from the block the font does have (same as host/clock).
#  - a leading AND trailing space centers each glyph within its colored block;
#    the catppuccin defaults pad only on the right.
# Must precede the theme load — its icon defaults are set-if-unset.
set -g @catppuccin_session_icon   " 󰆍 "
set -g @catppuccin_host_icon      " 󰒋 "
set -g @catppuccin_cpu_icon       " 󰻠 "
set -g @catppuccin_ram_icon       " 󰘚 "
set -g @catppuccin_date_time_icon " 󰃰 "

run ~/.tmux/plugins/catppuccin/catppuccin.tmux

# Trim the built-in clock module to just HH:MM.
set -g @catppuccin_date_time_text " %H:%M"

# Left: session name (catppuccin module).
set -g  status-left ""
set -ag status-left "#{E:@catppuccin_status_session}"
set -g  status-left-length 40

# Right: host · cpu · mem · clock — all catppuccin modules.
# cpu/ram are added with -F so their literal #{cpu_percentage}/#{ram_percentage}
# placeholders land in status-right; tmux-cpu's cpu.tmux (run last) rewrites
# those into its scripts. host/session/clock stay dynamic via #{E:...} (no -F).
set -g  status-right ""
set -ag  status-right "#{E:@catppuccin_status_host}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag  status-right "#{E:@catppuccin_status_date_time}"
set -g status-right-length 150

run ~/.tmux/plugins/tmux-cpu/cpu.tmux

# --- Session persistence: resurrect + continuum -----------------------------
# Survive reboots / crashes / idle-shutdown. Installed directly (no plugin
# manager), same auto-clone-on-first-launch pattern as the theme plugins above:
#   tmux-plugins/tmux-resurrect  — save/restore layout, cwd, pane scrollback
#   tmux-plugins/tmux-continuum  — auto-save on an interval + auto-restore on start
# Manual save/restore stay available: prefix + Ctrl-s / prefix + Ctrl-r.
run-shell -b 'D="$HOME/.tmux/plugins/tmux-resurrect"; [ -e "$D/resurrect.tmux" ] || git clone --depth 1 https://github.com/tmux-plugins/tmux-resurrect "$D" >/dev/null 2>&1'
run-shell -b 'D="$HOME/.tmux/plugins/tmux-continuum"; [ -e "$D/continuum.tmux" ] || git clone --depth 1 https://github.com/tmux-plugins/tmux-continuum "$D" >/dev/null 2>&1'

# Keep saved state on the persistent data volume when present, so it survives a
# devenv rebuild (fresh root disk); elsewhere fall back to resurrect's default
# under ~/.local/share. @resurrect-dir is read at save/restore time, not at load
# time, so this async if-shell does not race the plugin load below.
if-shell '[ -d /mnt/devdata/tools ]' "set -g @resurrect-dir '/mnt/devdata/tools/tmux-resurrect'"
# Restore visible scrollback so prior output (e.g. a Claude transcript) is
# readable after a restart.
set -g @resurrect-capture-pane-contents 'on'
# Layout only: deliberately NOT setting @resurrect-processes, so programs are
# not relaunched on restore. Claude sessions in particular are resumed by hand
# (claude --resume) per window, since multiple sessions can share one cwd and
# an auto `claude --continue` would collide on the most-recent session.
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
# Auto-restore only fires if the tmux server started within this many seconds
# (default 10), checked on a status refresh — too tight, so a slightly slow
# attach after reboot misses the window and silently skips. Widen to 60s.
# Not a guarantee (the "no other tmux server" guard still applies); prefix+Ctrl-r
# is the dependable on-demand restore.
set -g @continuum-restore-max-delay '60'

run ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run ~/.tmux/plugins/tmux-continuum/continuum.tmux
